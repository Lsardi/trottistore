version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "10"
    compress: "true"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trottistore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trottistore}
      POSTGRES_USER: ${POSTGRES_USER:-trottistore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trottistore} -d ${POSTGRES_DB:-trottistore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: trottistore-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - internal

  ecommerce:
    build:
      context: .
      dockerfile: services/ecommerce/Dockerfile
    container_name: trottistore-ecommerce
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - internal

  crm:
    build:
      context: .
      dockerfile: services/crm/Dockerfile
    container_name: trottistore-crm
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - internal

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    container_name: trottistore-analytics
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - internal

  sav:
    build:
      context: .
      dockerfile: services/sav/Dockerfile
    container_name: trottistore-sav
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: trottistore-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      ecommerce:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: trottistore-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - ecommerce
      - crm
      - analytics
      - sav
    logging: *default-logging
    networks:
      - internal

  backup:
    image: postgres:16-alpine
    container_name: trottistore-backup
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Backup cron started"
        while true; do
          sleep 21600  # Every 6 hours
          echo "[$(date)] Running database backup..."
          PGPASSWORD="$$POSTGRES_PASSWORD" pg_dump -h postgres -U "$${POSTGRES_USER:-trottistore}" "$${POSTGRES_DB:-trottistore}" | gzip > /backups/trottistore_$$(date +%Y%m%d_%H%M%S).sql.gz
          # Cleanup backups older than 30 days
          find /backups -name "trottistore_*.sql.gz" -mtime +30 -delete
          echo "[$(date)] Backup complete"
        done
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trottistore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trottistore}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  backup_data:

networks:
  internal:
    driver: bridge
