name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all, web, ecommerce, crm, sav, analytics, none)"
        required: false
        default: "all"
      run_migrations:
        description: "Run prisma migrate deploy against prod DB before deploy"
        type: boolean
        required: false
        default: true
      run_seed_catalog:
        description: "Run scripts/seed.ts (731 products + 3 users). Idempotent via upsert. Requires SEED_ADMIN_PASSWORD secret."
        type: boolean
        required: false
        default: false
      run_seed_orders:
        description: "Run scripts/seed-orders.ts (~30 demo orders for analytics). Idempotent guard at orders >= 10."
        type: boolean
        required: false
        default: false
      run_healthchecks:
        description: "Run production healthchecks after deploy"
        type: boolean
        required: false
        default: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}

jobs:
  prepare-database:
    name: Prepare prod DB (migrate + optional seed)
    runs-on: ubuntu-latest
    environment: production
    if: inputs.run_migrations || inputs.run_seed_catalog || inputs.run_seed_orders
    steps:
      - uses: actions/checkout@v4

      - name: Validate database secrets
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: |
          if [ -z "${RAILWAY_DATABASE_URL}" ]; then
            echo "Missing required secret: RAILWAY_DATABASE_URL"
            echo "Set it once via: gh secret set RAILWAY_DATABASE_URL --env production"
            exit 1
          fi
          if [ "${{ inputs.run_seed_catalog }}" = "true" ] && [ -z "${SEED_ADMIN_PASSWORD}" ]; then
            echo "Missing required secret: SEED_ADMIN_PASSWORD (required when run_seed_catalog=true)"
            echo "Set it once via: gh secret set SEED_ADMIN_PASSWORD --env production"
            echo "Must be >= 12 chars (enforced by scripts/seed.ts)"
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: pnpm --filter @trottistore/database db:generate

      - name: Run prisma migrate deploy
        if: inputs.run_migrations
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: pnpm --filter @trottistore/database db:deploy

      - name: Seed catalog (731 products + 3 users)
        if: inputs.run_seed_catalog
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: pnpm --filter @trottistore/scripts seed

      - name: Seed demo orders (analytics dashboards)
        if: inputs.run_seed_orders
        env:
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: pnpm --filter @trottistore/scripts seed:orders

  deploy:
    name: Deploy to Railway Production
    runs-on: ubuntu-latest
    environment: production
    needs: prepare-database
    if: |
      always() &&
      (needs.prepare-database.result == 'success' || needs.prepare-database.result == 'skipped') &&
      inputs.service != 'none'
    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway configuration
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "Missing required secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [ -z "${RAILWAY_PROJECT_ID}" ]; then
            echo "Missing required variable: RAILWAY_PROJECT_ID"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Web (Next.js)
        if: inputs.service == 'all' || inputs.service == 'web'
        run: |
          cd apps/web
          railway up --service web --environment production --detach -p "$RAILWAY_PROJECT_ID"

      - name: Deploy Ecommerce Service
        if: inputs.service == 'all' || inputs.service == 'ecommerce'
        run: |
          cd services/ecommerce
          railway up --service ecommerce --environment production --detach -p "$RAILWAY_PROJECT_ID"

      - name: Deploy CRM Service
        if: inputs.service == 'all' || inputs.service == 'crm'
        run: |
          cd services/crm
          railway up --service crm --environment production --detach -p "$RAILWAY_PROJECT_ID"

      - name: Deploy SAV Service
        if: inputs.service == 'all' || inputs.service == 'sav'
        run: |
          cd services/sav
          railway up --service sav --environment production --detach -p "$RAILWAY_PROJECT_ID"

      - name: Deploy Analytics Service
        if: inputs.service == 'all' || inputs.service == 'analytics'
        run: |
          cd services/analytics
          railway up --service analytics --environment production --detach -p "$RAILWAY_PROJECT_ID"

  healthcheck:
    name: Post-deploy healthchecks (prod)
    needs: deploy
    if: inputs.run_healthchecks && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to start
        run: sleep 30

      - name: Check Web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_WEB_URL || 'https://trottistore.fr' }}/" || echo "000")
          echo "Web: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ] || exit 1

      - name: Check Ecommerce /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_ECOMMERCE_URL || 'https://ecommerce.trottistore.fr' }}/health" || echo "000")
          echo "Ecommerce: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check CRM /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_CRM_URL || 'https://crm.trottistore.fr' }}/health" || echo "000")
          echo "CRM: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check SAV /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_SAV_URL || 'https://sav.trottistore.fr' }}/health" || echo "000")
          echo "SAV: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check Analytics /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PROD_ANALYTICS_URL || 'https://analytics.trottistore.fr' }}/health" || echo "000")
          echo "Analytics: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check Ecommerce /ready
        run: |
          BODY=$(curl -s "${{ vars.PROD_ECOMMERCE_URL || 'https://ecommerce.trottistore.fr' }}/ready")
          echo "Ecommerce ready: $BODY"
          echo "$BODY" | grep -q '"ready"' || exit 1

      - name: Summary
        if: always()
        run: echo "Production healthchecks complete"
