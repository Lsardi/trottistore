name: CI — TrottiStore Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  # ─────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @trottistore/database db:generate

      - name: Type check all packages
        run: pnpm -r exec tsc --noEmit || true

  # ─────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @trottistore/database db:generate

      - name: Build all packages
        run: pnpm build

  # ─────────────────────────────────────────────
  # Docker Build (services)
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service: [ecommerce, crm, analytics, sav]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t trottistore/${{ matrix.service }}:${{ github.sha }} \
            .

  # ─────────────────────────────────────────────
  # Database Schema Validation
  # ─────────────────────────────────────────────
  db-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @trottistore/database exec prisma validate

      - name: Generate Prisma Client (verify generation works)
        run: pnpm --filter @trottistore/database db:generate
