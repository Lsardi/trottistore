name: CI — TrottiStore Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, techlead/fond-comble-audit]

env:
  NODE_VERSION: '22'
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  # ─────────────────────────────────────────────
  # Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @trottistore/database db:generate

      - name: Type check all packages
        run: |
          pnpm --filter @trottistore/web lint
          pnpm --filter @trottistore/database lint
          pnpm --filter @trottistore/shared lint
          pnpm --filter @trottistore/ui lint
          pnpm --filter @trottistore/service-ecommerce lint
          pnpm --filter @trottistore/service-crm lint
          pnpm --filter @trottistore/service-sav lint
          pnpm --filter @trottistore/service-analytics lint

  # ─────────────────────────────────────────────
  # Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @trottistore/database db:generate

      - name: Build all packages
        run: pnpm build

  # ─────────────────────────────────────────────
  # Docker Build (services)
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [ecommerce, crm, analytics, sav]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t trottistore/${{ matrix.service }}:${{ github.sha }} \
            .

  # ─────────────────────────────────────────────
  # Database Schema Validation
  # ─────────────────────────────────────────────
  db-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        # NOTE: For production CD pipeline, use `pnpm db:deploy` (prisma migrate deploy)
        # instead of `db:push` to apply migrations safely and reproducibly.
        run: pnpm --filter @trottistore/database exec prisma validate

      - name: Generate Prisma Client (verify generation works)
        run: pnpm --filter @trottistore/database db:generate

  # ─────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trottistore/database db:generate
      - run: pnpm test -- --coverage

  # ─────────────────────────────────────────────
  # Smoke Tests (critical release flows)
  # ─────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trottistore/database db:generate
      - run: pnpm test:smoke

  # ─────────────────────────────────────────────
  # Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─────────────────────────────────────────────
  # E2E Tests (PRs to main only)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trottistore/database db:generate
      - run: pnpm build
      - name: Install Playwright browsers
        run: pnpm --filter @trottistore/web exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm --filter @trottistore/web test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/web/test-results
          retention-days: 14
