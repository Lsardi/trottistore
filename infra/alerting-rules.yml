groups:
  - name: trottistore-infra
    rules:
      # Service down — no /health response for 2 minutes
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been unreachable for 2 minutes."

      # High error rate — >5% of requests return 5xx
      - alert: HighErrorRate
        expr: rate(trottistore_http_requests_total{status_code=~"5.."}[5m]) / rate(trottistore_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has >5% error rate for 5 minutes."

      # High latency — p95 > 2s
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(trottistore_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency >2s for 5 minutes."

      # Database connection failure (A10.1 — real gauge from /ready endpoint)
      - alert: DatabaseUnhealthy
        expr: trottistore_database_healthy == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL unreachable"
          description: "PostgreSQL has been unreachable for 1 minute. Check DB status."

      # Redis connection failure
      - alert: RedisUnhealthy
        expr: trottistore_redis_healthy == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis unreachable"
          description: "Redis has been unreachable for 1 minute. Carts and locks affected."

  - name: trottistore-checkout
    rules:
      # Payment failures spike — more than 3 in 5 minutes
      - alert: PaymentFailureSpike
        expr: increase(trottistore_payments_failed_total[5m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Payment failures spiking"
          description: "{{ $value }} payment failures in last 5 minutes. Check Stripe dashboard + webhook logs."

      # Webhook errors — any webhook processing error
      - alert: WebhookProcessingError
        expr: increase(trottistore_stripe_webhook_events_total{result="error"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Stripe webhook processing errors"
          description: "{{ $value }} webhook errors in last 5 minutes. Check ecommerce logs."

      # No orders in 1 hour (during business hours, adjust as needed)
      - alert: NoOrdersCreated
        expr: increase(trottistore_orders_created_total[1h]) == 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "No orders created in 1 hour"
          description: "Zero orders in the last hour. Checkout may be broken."

      # Checkout errors spike — more than 10 in 5 minutes
      - alert: CheckoutErrorSpike
        expr: increase(trottistore_checkout_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Checkout errors spiking ({{ $labels.error_code }})"
          description: "{{ $value }} checkout errors of type {{ $labels.error_code }} in 5 minutes."

      # Refund failures
      - alert: RefundFailure
        expr: increase(trottistore_refunds_total{result="stripe_error"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Stripe refund failed"
          description: "A refund failed via Stripe. Manual intervention may be needed."

  - name: trottistore-finance
    rules:
      # High refund rate — more than 5% of orders refunded in 24h
      - alert: HighRefundRate
        expr: increase(trottistore_refunds_total{type="full"}[24h]) / increase(trottistore_orders_created_total[24h]) > 0.05
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Refund rate above 5%"
          description: "{{ $value | humanizePercentage }} of orders refunded in last 24h. Review refund reasons."

      # Reconciliation discrepancy detected
      - alert: ReconciliationDiscrepancy
        expr: trottistore_reconciliation_discrepancies > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Financial reconciliation found discrepancies"
          description: "{{ $value }} orders have payment/charge mismatch. Run reconciliation report."

      # Orphan payments — payment without matching order
      - alert: OrphanPayments
        expr: trottistore_orphan_payments > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Orphan payments detected"
          description: "{{ $value }} payments exist without a matching order."

      # Stale pending payments — pending for more than 24h
      - alert: StalePendingPayments
        expr: trottistore_stale_pending_payments > 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} payments stuck in PENDING > 24h"
          description: "Payments may need manual confirmation or cancellation."

  - name: trottistore-slo
    rules:
      # Fast burn: consuming >=14x allowed error budget on short and medium windows.
      - alert: SLOCheckoutErrorBudgetFastBurn
        expr: trottistore:slo_checkout_error_budget_burn_rate_5m > 14 and trottistore:slo_checkout_error_budget_burn_rate_1h > 14
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Checkout SLO fast burn"
          description: "Checkout is burning error budget at >14x (5m and 1h). Immediate mitigation required."

      # Slow burn: sustained burn that will consume monthly budget early if ignored.
      - alert: SLOCheckoutErrorBudgetSlowBurn
        expr: trottistore:slo_checkout_error_budget_burn_rate_1h > 3 and trottistore:slo_checkout_error_budget_burn_rate_6h > 3
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Checkout SLO slow burn"
          description: "Checkout is burning error budget at >3x (1h and 6h). Plan mitigation in current on-call shift."

      - alert: SLOCheckoutErrorBudgetExhausted
        expr: trottistore:slo_checkout_error_budget_remaining_30d < 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Checkout error budget exhausted"
          description: "30d checkout availability dropped below 99.9%. Freeze risky deploys until SLO recovers."

      - alert: SLOCheckoutLatencyDegraded
        expr: trottistore:slo_checkout_latency_p95_5m > 1.5 and trottistore:slo_checkout_latency_p95_30m > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Checkout latency SLO degradation"
          description: "Checkout p95 latency is above target on both 5m and 30m windows."

  - name: trottistore-performance
    rules:
      - alert: CheckoutPaymentIntentP99High
        expr: trottistore:perf_checkout_payment_intent_p99_5m > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Checkout payment-intent p99 high"
          description: "p99 on /checkout/payment-intent is above 2s for 10 minutes."

      - alert: OrdersCreateP99High
        expr: trottistore:perf_orders_create_p99_5m > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Orders create p99 high"
          description: "p99 on POST /orders is above 5s for 10 minutes."

      - alert: AdminOrdersListP95High
        expr: trottistore:perf_admin_orders_list_p95_5m > 1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Admin orders list p95 high"
          description: "p95 on GET /admin/orders is above 1s for 15 minutes."
