groups:
  - name: trottistore-infra
    rules:
      # Service down — no /health response for 2 minutes
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been unreachable for 2 minutes."

      # High error rate — >5% of requests return 5xx
      - alert: HighErrorRate
        expr: rate(trottistore_http_requests_total{status_code=~"5.."}[5m]) / rate(trottistore_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has >5% error rate for 5 minutes."

      # High latency — p95 > 2s
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(trottistore_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency >2s for 5 minutes."

      # Database connection failure
      - alert: DatabaseUnhealthy
        expr: probe_success{job="readiness"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database or Redis unreachable from {{ $labels.instance }}"

  - name: trottistore-checkout
    rules:
      # Payment failures spike — more than 3 in 5 minutes
      - alert: PaymentFailureSpike
        expr: increase(trottistore_payments_failed_total[5m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Payment failures spiking"
          description: "{{ $value }} payment failures in last 5 minutes. Check Stripe dashboard + webhook logs."

      # Webhook errors — any webhook processing error
      - alert: WebhookProcessingError
        expr: increase(trottistore_stripe_webhook_events_total{result="error"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Stripe webhook processing errors"
          description: "{{ $value }} webhook errors in last 5 minutes. Check ecommerce logs."

      # No orders in 1 hour (during business hours, adjust as needed)
      - alert: NoOrdersCreated
        expr: increase(trottistore_orders_created_total[1h]) == 0
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "No orders created in 1 hour"
          description: "Zero orders in the last hour. Checkout may be broken."

      # Checkout errors spike — more than 10 in 5 minutes
      - alert: CheckoutErrorSpike
        expr: increase(trottistore_checkout_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Checkout errors spiking ({{ $labels.error_code }})"
          description: "{{ $value }} checkout errors of type {{ $labels.error_code }} in 5 minutes."

      # Refund failures
      - alert: RefundFailure
        expr: increase(trottistore_refunds_total{result="stripe_error"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Stripe refund failed"
          description: "A refund failed via Stripe. Manual intervention may be needed."
