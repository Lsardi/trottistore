global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "ecommerce"
    static_configs:
      - targets: ["ecommerce:3001"]
    metrics_path: /health

  - job_name: "crm"
    static_configs:
      - targets: ["crm:3002"]
    metrics_path: /health

  - job_name: "analytics"
    static_configs:
      - targets: ["analytics:3003"]
    metrics_path: /health

  - job_name: "sav"
    static_configs:
      - targets: ["sav:3004"]
    metrics_path: /health
